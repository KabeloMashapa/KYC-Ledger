spring.application.name=demo

server.port=8080

spring.datasource.url=jdbc:h2:mem:kycdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=


spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

jwt.secret=kyc-blockchain-super-secret-key-must-be-256-bits-long-for-hs256
jwt.expiration=86400000

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
kyc.document.upload-dir=uploads/documents

# HYPERLEDGER FABRIC

fabric.network.config-path=src/main/resources/crypto-config
fabric.channel.name=kyc-channel
fabric.chaincode.name=kyc-chaincode
fabric.org1.msp-id=Org1MSP
fabric.org1.peer-endpoint=grpc://localhost:7051
fabric.org1.gateway-peer=peer0.org1.example.com
fabric.wallet-path=src/main/resources/wallet
fabric.admin.username=admin
fabric.admin.password=adminpw

